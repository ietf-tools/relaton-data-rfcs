abstract:
- content: "<p>Enabling support for automatic acceptance of DNSSEC Delegation Signer
    (DS) parameters from the Child DNS operator (via RFCs 7344, 8078, and 9615) requires
    the Parental Agent, often a registry or registrar, to make a number of technical
    decisions around acceptance checks, error and success reporting, and multi-party
    issues such as concurrent updates. This document describes recommendations about
    how these points are best addressed in practice.</p>"
