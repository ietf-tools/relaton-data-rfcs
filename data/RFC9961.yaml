abstract:
- content: "<p>Segment Routing (SR) Point-to-Multipoint (P2MP) Policies are used to
    define and manage explicit P2MP paths within a network. These policies are typically
    calculated via a controller-based mechanism and installed via, e.g., a Path Computation
    Element (PCE). In other cases, these policies can be installed using the Network
    Configuration Protocol (NETCONF) / YANG or a Command Line Interface (CLI). They
    are used to steer Multicast traffic along optimized paths from a Root to a set
    of Leaf routers.</p><p>This document defines extensions to ping and traceroute
    mechanisms for an SR P2MP Policy with MPLS encapsulation to provide Operations,
    Administration, and Maintenance (OAM) capabilities. The extensions enable operators
    to verify connectivity, diagnose failures, and troubleshoot forwarding issues
    within SR P2MP Policy Multicast trees.</p><p>By introducing new mechanisms for
    detecting failures and validating path integrity, this document enhances the operational
    robustness of P2MP Multicast deployments. Additionally, it ensures that existing
    MPLS and SR-based OAM tools can be effectively applied to networks utilizing SR
    P2MP Policies.</p>"
