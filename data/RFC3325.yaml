abstract:
- content: "<p>This document describes private extensions to SIP that enable a\r\nnetwork
    of trusted SIP servers to assert the identity of\r\nauthenticated users, and the
    application of existing privacy\r\nmechanisms to the identity problem. The use
    of these extensions is\r\nonly applicable inside an administrative domain with
    previously\r\nagreed-upon policies for generation, transport and usage of such\r\ninformation.
    This document does NOT offer a general privacy or\r\nidentity model suitable for
    use between different trust domains, or\r\nuse in the Internet at large.</p>"
