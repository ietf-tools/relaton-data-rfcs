abstract:
- content: "<p>This document provides guidelines for authors and reviewers of specifications
    containing YANG data models, including IANA-maintained YANG modules. Recommendations
    and procedures are defined, which are intended to increase interoperability and
    usability of Network Configuration Protocol (NETCONF) and RESTCONF protocol implementations
    that utilize YANG modules.</p><p>This document obsoletes RFC 8407; it also updates
    RFC 8126 by providing additional guidelines for writing the IANA considerations
    for RFCs that specify IANA-maintained YANG modules.</p>"
