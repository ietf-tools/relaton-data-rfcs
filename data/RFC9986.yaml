abstract:
- content: "<p>This document describes a Bidirectional Forwarding Detection (BFD)
    Optimized Authentication Mode known as Meticulous Keyed ISAAC Authentication.
    This mode can be used to authenticate some BFD packets with less CPU time cost
    than using MD5 or SHA-1 with the trade-off of decreased security. This mechanism
    cannot be used to signal state changes, but it can be used to maintain a session
    in the Up state.</p>"
