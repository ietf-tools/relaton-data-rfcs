abstract:
- content: "<p>This specification defines a profile of the Online Certificate Status\r\n
    Protocol (OCSP) that addresses the scalability issues inherent when\r\n using
    OCSP in large scale (high volume) Public Key Infrastructure\r\n (PKI) environments
    and/or in PKI environments that require a\r\n lightweight solution to minimize
    communication bandwidth and client-\r\n side processing.\r\n\r\n This specification
    obsoletes RFC 5019. The profile specified in RFC\r\n 5019 has been updated to
    allow and recommend the use of SHA-256 over\r\n SHA-1.</p>"
