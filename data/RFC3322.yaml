abstract:
- content: "<p>In wireless environments and especially in cellular systems, e.g. GSM\r\n(Global
    System for Mobile communications) and UMTS (Universal Mobile\r\nTelecommunications
    System), there is a need to maximize the transport\r\nefficiency for data over
    the radio interface. With the introduction\r\nof SIP/SDP (Session Initiation Protocol/Session
    Description Protocol)\r\nto cellular devices, compression of the signaling messages
    should be\r\nconsidered in order to improve both service availability and quality,\r\nmainly
    by reducing the user idle time, e.g. at call setup. The\r\npurpose of this document
    is to outline requirements and motivations\r\nfor development of a scheme for
    compression and decompression of\r\nmessages from signaling protocols.</p>"
