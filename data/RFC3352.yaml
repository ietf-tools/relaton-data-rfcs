abstract:
- content: "<p>The Connection-less Lightweight Directory Access Protocol (CLDAP)\r\ntechnical
    specification, RFC 1798, was published in 1995 as a Proposed\r\nStandard. This
    document discusses the reasons why the CLDAP technical\r\nspecification has not
    been furthered on the Standard Track. This\r\ndocument recommends that RFC 1798
    be moved to Historic status.</p>"
