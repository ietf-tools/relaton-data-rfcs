abstract:
- content: "<p>Use of TLS 1.3, which fixes some known deficiencies in TLS 1.2, is
    growing. This document specifies that no changes will be approved for TLS 1.2
    outside of urgent security fixes (as determined by TLS Working Group consensus),
    new TLS Exporter Labels, and new Application-Layer Protocol Negotiation (ALPN)
    Protocol IDs. This applies to TLS only; it does not apply to DTLS (in any DTLS
    version).</p>"
