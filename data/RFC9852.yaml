abstract:
- content: "<p>TLS 1.3 is widely used, has had comprehensive security proofs, and
    improves both security and privacy deficiencies in TLS 1.2. Therefore, new protocols
    that use TLS must require TLS 1.3. As DTLS 1.3 is not widely available or deployed,
    this prescription does not pertain to DTLS (in any DTLS version); it pertains
    to TLS only.</p><p>This document updates RFC 9325. It discusses post-quantum cryptography
    and the security and privacy improvements in TLS 1.3 as the rationale for the
    update.</p>"
