abstract:
- content: "<p>This document specifies version 1.3 of the Transport Layer Security
    (TLS) protocol. TLS allows client/server applications to communicate over the
    Internet in a way that is designed to prevent eavesdropping, tampering, and message
    forgery.</p><p>This document obsoletes RFC 8446, which specified TLS 1.3. This
    document obsoletes RFC 5246 (specifying TLS 1.2) and RFCs 5077, 6961, 7627, and
    8422, all of which pertain to TLS 1.2 or earlier, and updates RFCs 5705 and 6066.
    This document also specifies new requirements for TLS 1.2 implementations.</p>"
