abstract:
- content: "<p>This document specifies guidelines that must be implemented by any
    \r\nentity responsible for allocating IPv6 multicast addresses. This \r\nincludes,
    but is not limited to, any documents or entities wishing \r\nto assign permanent
    IPv6 multicast addresses, allocate dynamic IPv6 \r\nmulticast addresses, and define
    permanent IPv6 multicast group \r\nidentifiers. The purpose of these guidelines
    is to reduce the \r\nprobability of IPv6 multicast address collision, not only
    at the \r\nIPv6 layer, but also at the link-layer of media that encode portions
    \r\nof the IP layer address into the MAC layer address.</p>"
