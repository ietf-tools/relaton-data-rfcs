abstract:
- content: "<p>This document specifies the MPLS Network Action (MNA) Sub-Stack for
    carrying network actions and Ancillary Data (AD) in the MPLS label stack. MNA
    can be used to influence packet-forwarding decisions, carry additional Operations,
    Administration, and Maintenance (OAM) information in the MPLS packet, or perform
    user-defined operations.</p><p>This document updates RFC 9789 to refine the list
    of pieces of information that must be included in any document that defines an
    MNA.</p>"
