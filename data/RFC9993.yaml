abstract:
- content: "<p>This memo specifies an RTP payload format for MPEG-I haptic data. A
    haptic media stream is composed of MPEG-I Haptic Stream (MIHS) units including
    a MIHS unit header and zero or more MIHS packets. The RTP payload header format
    allows for packetization of a MIHS unit in an RTP packet payload as well as fragmentation
    of a MIHS unit into multiple RTP packets. The original subtype registration for
    'haptics/hmpg' (RFC 9695) did not include any required or optional parameters.
    This memo updates RFC 9695 and the 'haptics/hmpg' registration to add optional
    parameters. It also provides Session Description Protocol (SDP) usage information
    for the 'haptics' media type.</p>"
