abstract:
- content: "<p>This memo refers to a metric for variation in delay of packets across\r\nInternet
    paths. The metric is based on the difference in the One-Way-\r\nDelay of selected
    packets. This difference in delay is called 'IP\r\nPacket Delay variation.'\r\nThe
    metric is valid for measurements between two hosts both in the\r\ncase that they
    have synchronized clocks and in the case that they are\r\nnot synchronized. We
    discuss both in this draft.</p>"
