abstract:
- content: "<p>The Layer Two Tunneling Protocol (L2TP) [RFC2661] provides a standard\r\nmethod
    for transporting the link layer of PPP [RFC1661] between a\r\ndial-up server and
    a Network Access Server, using a network\r\nconnection in lieu of a physical point
    to point connection. This\r\ndocument describes the use of an ATM network for
    the underlying\r\nnetwork connection. ATM User-Network Interface (UNI) Signalling\r\nSpecification
    Version 4.0 [SIG40] or Version 3.1 [SIG31] with ATM\r\nAdaptation Layer 5 (AAL5)
    [ITU93] are supported as interfaces to the\r\nATM network.</p>"
