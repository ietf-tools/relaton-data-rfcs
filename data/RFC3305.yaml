abstract:
- content: "<p>This paper is the product of the W3C URI Interest Group. It\r\naddresses
    and attempts to clarify two issues pertaining to URIs, and\r\npresents recommendations.
    Section 1 addresses how URI space is\r\npartitioned and the relationship between
    URIs, URLs, and URNs.\r\nSection 2 describes how URI schemes and URN namespace
    ids are\r\nregistered. Section 3 mentions additional unresolved issues not\r\nconsidered
    by this paper and section 4 presents recommendations.\r\nQuestions concerning
    this document should be directed to the\r\nuri@w3.org mailing list.</p>"
