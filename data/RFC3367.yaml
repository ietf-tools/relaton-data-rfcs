abstract:
- content: "<p>People often refer to things in the real world by a common name or\r\nphrase,
    e.g., a trade name, company name, or a book title. These\r\nnames are sometimes
    easier for people to remember and type than\r\nURLs. Furthermore, because of the
    limited syntax of URLs, companies\r\nand individuals are finding that the ones
    that might be most\r\nreasonable for their resources are being used elsewhere
    and so are\r\nunavailable. For the purposes of this document, a 'common name'
    is a\r\nword or a phrase, without imposed syntactic structure, that may be\r\nassociated
    with a resource.</p>"
