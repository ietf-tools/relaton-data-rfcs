abstract:
- content: "<p>The Internet exhibits certain specific types of behavior (e.g.,\r\nbursty
    packet loss) that can affect the performance seen by the users\r\nas well as the
    operators. The loss pattern or loss distribution is a\r\nkey parameter that determines
    the performance observed by the users\r\nfor certain real-time applications such
    as packet voice and video.\r\nFor the same loss rate, two different loss distributions
    could\r\npotentially produce widely different perceptions of performance.\r\nUsing
    the base loss metric defined in RFC 2680, this document defines \r\ntwo derived
    metrics 'loss distance' and 'loss period', and the \r\nassociated statistics that
    together capture loss patterns experienced\r\nby packet streams on the Internet.</p>"
