abstract:
- content: "<p>As the deployment of second and third generation cellular networks
    \r\nprogresses, a large number of cellular hosts are being connected to \r\nthe
    Internet. Standardization organizations are making IPv6 \r\nmandatory in their
    specifications. However, the concept of IPv6 \r\ncovers many aspects and numerous
    specifications. In addition, the \r\ncharacteristics of cellular links in terms
    of bandwidth, cost and \r\ndelay put special requirements on how IPv6 is used.
    This document \r\nconsiders IPv6 for cellular hosts that attach to the General
    Packet \r\nRadio Service (GPRS), or Universal Mobile Telecommunications System
    \r\n(UMTS) networks. The document lists basic components of IPv6 \r\nfunctionality
    and discusses some issues relating to the use of these \r\ncomponents when operating
    in these networks.</p>"
