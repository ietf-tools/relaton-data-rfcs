abstract:
- content: "<p>This document describes the need for QoS and media authorization and
    \r\ndefines a SIP extension that can be used to integrate QoS admission \r\ncontrol
    with call signaling and help guard against denial of service \r\nattacks. The
    use of this extension is only applicable in \r\nadministrative domains, or among
    federations of administrative \r\ndomains with previously agreed-upon policies,
    where both the SIP \r\nproxy authorizing the QoS, and the policy control of the
    underlying \r\nnetwork providing the QoS belong to that administrative domain
    or \r\nfederation of domains.</p>"
