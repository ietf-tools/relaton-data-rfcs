abstract:
- content: "<p>CBOR Object Signing and Encryption (COSE) Receipts prove properties
    of a Verifiable Data Structure (VDS) to a verifier. VDSs and associated Proof
    Types enable security properties, such as minimal disclosure, transparency, and
    non-equivocation. Transparency helps maintain trust over time and has been applied
    to certificates, end-to-end encrypted messaging systems, and supply chain security.
    This specification enables concise transparency-oriented systems by building on
    Concise Binary Object Representation (CBOR) and COSE. The extensibility of the
    approach is demonstrated by providing CBOR encodings for Merkle inclusion and
    consistency proofs.</p>"
