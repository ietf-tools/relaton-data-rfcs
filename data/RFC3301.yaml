abstract:
- content: "<p>L2TP [RFC2661] specifies a protocol for tunnelling PPP packets over\r\npacket
    based networks and over IP networks in particular. L2TP\r\n[RFC2661] supports
    remote access by ISDN and PSTN networks. This\r\ndocument augments the procedures
    described in [RFC2661] to further\r\nsupport ATM SVC or PVC based access networks.
    The extensions defined\r\nwithin this document allow for asymmetric bi-directional
    call\r\nestablishment and service selection in the ATM access network.</p>"
