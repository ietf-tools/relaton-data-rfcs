abstract:
- content: "<p>This document defines common types and groupings that are meant to
    be used for scheduling purposes, such as events, policies, services, or resources
    based on date and time. For the sake of better modularity, the YANG module includes
    a set of recurrence-related groupings with varying levels of representation (i.e.,
    from basic to advanced) to accommodate a variety of requirements. It also defines
    groupings for validating requested schedules and reporting scheduling statuses.</p>"
