abstract:
- content: "<p>This document offers a framework for IP multicast deployment in an\r\nMPLS
    environment. Issues arising when MPLS techniques are applied to\r\nIP multicast
    are overviewed. The pros and cons of existing IP\r\nmulticast routing protocols
    in the context of MPLS are described and\r\nthe relation to the different trigger
    methods and label distribution\r\nmodes are discussed. The consequences of various
    layer 2 (L2)\r\ntechnologies are listed. Both point-to-point and multi-access\r\nnetworks
    are considered.</p>"
