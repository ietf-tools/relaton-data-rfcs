abstract:
- content: "<p>The IETF has two different proposals on the table for how to do DNS\r\nsupport
    for IPv6, and has thus far failed to reach a clear consensus\r\non which approach
    is better. This note attempts to examine the pros\r\nand cons of each approach,
    in the hope of clarifying the debate so\r\nthat we can reach closure and move
    on.</p>"
