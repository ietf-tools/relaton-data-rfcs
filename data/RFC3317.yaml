abstract:
- content: "<p>This document describes a Policy Information Base (PIB) for a device
    \r\nimplementing the Differentiated Services Architecture. The \r\nprovisioning
    classes defined here provide policy control of \r\nresources implementing the
    Differentiated Services Architecture. \r\nThese provisioning classes can be used
    with other none \r\nDifferentiated Services provisioning classes (defined in other
    PIBs) \r\nto provide for a comprehensive policy controlled mapping of service
    \r\nrequirement to device resource capability and usage.</p>"
