abstract:
- content: "<p>The IS-IS routing protocol (ISO 10589) requires reliable protocols
    at\r\nthe link layer for point-to-point links. As a result, it does not use\r\na
    three-way handshake when establishing adjacencies on point-to-point\r\nmedia.
    This paper defines an backward-compatible extension to the\r\nprotocol that provides
    for a three-way handshake. It is fully\r\ninteroperable with systems that do not
    support the extension.\r\nAdditionally, the extension allows the robust operation
    of more than\r\n256 point-to-point links on a single router.\r\nThis extension
    has been implemented by multiple router vendors; this\r\npaper is provided as
    information to the Internet community in order\r\nto allow interoperable implementations
    to be built by other vendors.</p>"
