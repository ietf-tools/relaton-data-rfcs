abstract:
- content: "<p>The popularity of gateways that interwork between the PSTN (Public\r\nSwitched
    Telephone Network) and SIP networks has motivated the\r\npublication of a set
    ofcommon practices that can assure consistent\r\nbehavior across implementations.
    This document taxonomizes the uses\r\nof PSTN-SIP gateways, provides uses cases,
    and identifies mechanisms\r\nnecessary for interworking. The mechanisms detail
    how SIP provides\r\nfor both 'encapsulation' (carriage of PSTN signaling across
    a SIP\r\nnetwork) and 'translation' (protocol mapping).</p>"
