abstract:
- content: "<p>This document describes a format that supports logging information
    about the secrets used in a TLS connection. Recording secrets to a file in SSLKEYLOGFILE
    format allows diagnostic and logging tools that use this file to decrypt messages
    exchanged by TLS endpoints. This format is intended for use in systems where TLS
    only protects test data.</p>"
