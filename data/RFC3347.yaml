abstract:
- content: "<p>The IP Storage Working group is chartered with developing \r\ncomprehensive
    technology to transport block storage data over IP \r\nprotocols. This effort
    includes a protocol to transport the Small \r\nComputer Systems Interface (SCSI)
    protocol over the Internet \r\n(iSCSI). The initial version of the iSCSI protocol
    will define a \r\nmapping of SCSI transport protocol over TCP/IP so that SCSI
    storage \r\ncontrollers (principally disk and tape arrays and libraries) can be
    \r\nattached to IP networks, notably Gigabit Ethernet (GbE) and 10 \r\nGigabit
    Ethernet (10 GbE).</p>"
