abstract:
- content: "<p>This document describes how to exchange structured business data\r\nsecurely
    using SMTP transport for Electronic Data Interchange,\r\n(EDI - either the American
    Standards Committee X12 or UN/EDIFACT,\r\nElectronic Data Interchange for Administration,
    Commerce and\r\nTransport), XML or other data used for business to business data\r\ninterchange.
    The data is packaged using standard MIME\r\ncontent-types. Authentication and
    privacy are obtained by using\r\nCryptographic Message Syntax (S/MIME) or OpenPGP
    security body\r\nparts. Authenticated acknowledgements make use of\r\nmultipart/signed
    replies to the original SMTP message.</p>"
