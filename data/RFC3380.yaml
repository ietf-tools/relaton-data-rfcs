abstract:
- content: "<p>This document specifies 3 additional OPTIONAL operations for use with\r\nthe
    Internet Printing Protocol/1.0 (IPP) [RFC2565, RFC2566], and\r\nIPP/1.1 [RFC2911,
    RFC2910]. The end user, operator, and\r\nadministrator Set-Job-Attributes and
    Set-Printer-Attributes\r\noperations are used to modify IPP Job objects and Printer
    objects,\r\nrespectively. The third administrator Get-Printer-Supported-Values\r\noperation
    returns values that the IPP Printer will accept for setting\r\nits 'xxx-supported'
    attributes.</p>"
