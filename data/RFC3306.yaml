abstract:
- content: "<p>This specification defines an extension to the multicast addressing
    \r\narchitecture of the IP Version 6 protocol. The extension presented \r\nin
    this document allows for unicast-prefix-based allocation of \r\nmulticast addresses.
    By delegating multicast addresses at the same \r\ntime as unicast prefixes, network
    operators will be able to identify \r\ntheir multicast addresses without needing
    to run an inter-domain \r\nallocation protocol.</p>"
