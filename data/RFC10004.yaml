abstract:
- content: "<p>This document provides a set of compliance statements about the Certificate
    Management over CMS (CMC) enrollment protocol. The ASN.1 structures and the transport
    mechanisms for the CMC enrollment protocol are covered in other documents (RFCs
    10002 and 10003). This document provides the information needed to make a compliant
    version of CMC.</p><p>This document obsoletes RFCs 5274 and 6402.</p>"
