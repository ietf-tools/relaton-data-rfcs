abstract:
- content: "<p>The Hypertext Transfer Protocol (HTTP) Authentication Framework\r\nincludes
    two authentication schemes: Basic and Digest. Both schemes\r\nemploy a shared
    secret based mechanism for access authentication.\r\nThe Authentication and Key
    Agreement (AKA) mechanism performs user\r\nauthentication and session key distribution
    in Universal Mobile\r\nTelecommunications System (UMTS) networks. AKA is a challenge-\r\nresponse
    based mechanism that uses symmetric cryptography. This memo\r\nspecifies an AKA
    based one-time password generation mechanism for\r\nHTTP Digest access authentication.</p>"
