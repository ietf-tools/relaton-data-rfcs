abstract:
- content: "<p>This document defines the base syntax for CMC, a Certificate Management
    protocol using the Cryptographic Message Syntax (CMS). This protocol addresses
    two immediate needs within the Internet Public Key Infrastructure (PKI) community:</p><p>CMC
    also requires the use of the transport document (RFC 10003) and the requirements
    usage document (RFC 10004) along with this document for a full definition.</p><p>This
    document obsoletes RFCs 5272 and 6402.</p>"
