abstract:
- content: "<p>This document surveys the short- and middle-range radio technologies
    over which providing Deterministic Networking (DetNet), and more specifically,
    Reliable and Available Wireless (RAW) service is suitable. It also presents the
    characteristics that RAW may leverage and explores the applicability of the technologies
    to carry deterministic flows, as of the time of publication. The studied technologies
    are Wi-Fi 6/7, Time-Slotted Channel Hopping (TSCH), 3GPP 5G, and L-band Digital
    Aeronautical Communications System (LDACS).</p>"
