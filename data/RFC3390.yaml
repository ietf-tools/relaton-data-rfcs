abstract:
- content: "<p>This document specifies an optional standard for TCP to increase the\r\npermitted
    initial window from one segment to roughly 4K bytes,\r\nreplacing RFC 2414. This
    document discusses the advantages and\r\ndisadvantages of the higher initial window.
    The document includes\r\ndiscussion of experiments and simulations showing that
    the higher\r\ninitial window does not lead to congestion collapse. Finally, the\r\ndocument
    provides guidance on implementation issues.</p>"
