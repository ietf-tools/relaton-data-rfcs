abstract:
- content: "<p>This document describes EtherIP, an early tunneling protocol, to\r\nprovide
    informational and historical context for the assignment of IP\r\nprotocol 97.
    EtherIP tunnels Ethernet and IEEE 802.3 media access\r\ncontrol frames in IP datagrams
    so that non-IP traffic can traverse an\r\nIP internet. The protocol is very lightweight,
    and it does not\r\nprovide protection against infinite loops.</p>"
