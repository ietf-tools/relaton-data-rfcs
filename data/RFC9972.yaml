abstract:
- content: "<p>The BGP Monitoring Protocol (BMP) described in RFC 7854 defines statistics
    message types to observe events that occur on a monitored router. This document
    defines new statistics types to monitor BMP Adj-RIB-In and Adj-RIB-Out Routing
    Information Bases (RIBs).</p>"
