abstract:
- content: "<p>This document contains recommendations from the Internet\r\nEngineering
    Task Force (IETF) IPv6 Working Group to the Third\r\nGeneration Partnership Project
    (3GPP) community regarding the use\r\nof IPv6 in the 3GPP standards. Specifically,
    this document\r\nrecommends that the 3GPP:\r\n1. Specify that multiple prefixes
    may be assigned to each\r\nprimary PDP context,\r\n2. Require that a given prefix
    must not be assigned to more\r\nthan one primary PDP context, and\r\n3. Allow
    3GPP nodes to use multiple identifiers within those\r\nprefixes, including randomly
    generated identifiers.\r\nThe IPv6 Working Group supports the use of IPv6 within
    3GPP and\r\noffers these recommendations in a spirit of open cooperation\r\nbetween
    the IPv6 Working Group and the 3GPP community. Since the\r\noriginal publication
    of this document as an Internet-Draft, the\r\n3GPP has adopted the primary recommendations
    of this document.</p>"
