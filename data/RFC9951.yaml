abstract:
- content: "<p>This document specifies new IP Flow Information Export (IPFIX) Information
    Elements to export the On-Path delay at each Operations, Administration, and Maintenance
    (OAM) transit and decapsulating nodes. The On-Path delay is defined as the delay
    between the OAM header encapsulating node and each OAM header transit and OAM
    header decapsulating nodes. This delay measurement is computed by an On-Path Telemetry
    protocol and is exported by the IPFIX process.</p>"
