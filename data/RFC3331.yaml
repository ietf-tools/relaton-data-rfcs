abstract:
- content: "<p>This Internet Draft defines a protocol for backhauling of SS7 MTP2\r\nUser
    signaling messages over IP using the Stream Control\r\nTransmission Protocol (SCTP).
    This protocol would be used between a\r\nSignaling Gateway (SG) and Media Gateway
    Controller (MGC). It is\r\nassumed that the SG receives SS7 signaling over a standard
    SS7\r\ninterface using the SS7 Message Transfer Part (MTP) to provide\r\ntransport.
    The Signaling Gateway would act as a Signaling Link\r\nTerminal.</p>"
