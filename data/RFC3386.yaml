abstract:
- content: "<p>This document is the deliverable out of the Network Hierarchy \r\nand
    Survivability Techniques Design Team established within the \r\nTraffic Engineering
    Working Group. This team collected and \r\ndocumented current and near term requirements
    for survivability \r\nand hierarchy in service provider environments. For clarity,
    \r\nan expanded set of definitions is included. The team \r\ndetermined that there
    appears to be a need to define a small \r\nset of interoperable survivability
    approaches in packet and \r\nnon-packet networks. Suggested approaches include
    path-based \r\nas well as one that repairs connections in proximity to the \r\nnetwork
    fault. They operate primarily at a single network \r\nlayer. For hierarchy, there
    did not appear to be a driving \r\nnear-term need for work on 'vertical hierarchy,'
    defined as \r\ncommunication between network layers such as TDM/optical and \r\nMPLS.
    In particular, instead of direct exchange of signaling \r\nand routing between
    vertical layers, some looser form of \r\ncoordination and communication, such
    as the specification of \r\nhold-off timers, is a nearer term need. For 'horizontal
    \r\nhierarchy' in data networks, there are several pressing needs. \r\nThe requirement
    is to be able to set up many LSPs in a service \r\nprovider network with hierarchical
    IGP. This is necessary to \r\nsupport layer 2 and layer 3 VPN services that require
    edge-to-\r\nedge signaling across a core network. \r\nPlease send comments to
    te-wg@ops.ietf.org</p>"
