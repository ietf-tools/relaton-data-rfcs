abstract:
- content: "<p>The purpose of this document is to make the AES Key Wrap algorithm
    \r\nconveniently available to the Internet community. The United States \r\nof
    America has adopted AES as the new encryption standard. The AES \r\nKey Wrap algorithm
    will probably be adopted by the USA for \r\nencryption of AES keys. The authors
    took most of the text in this \r\ndocument from the draft AES Key Wrap posted
    by NIST.</p>"
