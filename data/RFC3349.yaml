abstract:
- content: "<p>As a part of their deliverables, working groups of the IETF may\r\ndevelop
    BEEP profiles. During the development process, it is\r\ndesirable to assign a
    transient identifier to each profile. If the\r\nprofile is subsequently published
    as an RFC, then a permanent\r\nidentifier is subsequently assigned by the IANA.</p>"
