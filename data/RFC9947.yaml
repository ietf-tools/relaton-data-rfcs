abstract:
- content: "<p>This document describes an alternative experimental approach for the
    application of the Alternate-Marking Method to Segment Routing for IPv6 (SRv6).
    It uses an experimental TLV in the Segment Routing Header (SRH); thus, participation
    in this experiment should be between coordinating parties in a controlled domain.
    This approach has potential scaling and simplification benefits over the technique
    described in RFC 9343, and the scope of the experiment is to determine whether
    those are significant and attractive to the community.</p><p>This protocol extension
    has been developed outside the IETF as an alternative to the IETF's Standards
    Track specification RFC 9343 and it does not have IETF consensus. It is published
    here to guide experimental implementation and ensure interoperability among implementations
    to better determine the value of this approach. Researchers are invited to submit
    their evaluations of this work to the Independent Submissions Editor or to the
    IETF SPRING Working Group as Internet-Drafts.</p>"
