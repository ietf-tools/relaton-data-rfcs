abstract:
- content: "<p>This document defines new mechanisms for the Session Initiation\r\nProtocol
    (SIP) in support of privacy. Specifically, guidelines are\r\nprovided for the
    creation of messages that do not divulge personal\r\nidentity information. A new
    'privacy service' logical role for\r\nintermediaries is defined to answer some
    privacy requirements that\r\nuser agents cannot satisfy themselves. Finally, means
    are presented\r\nby which a user can request particular functions from a privacy\r\nservice.</p>"
