abstract:
- content: "<p>This document provides advice to the designers of digital\r\ncommunication
    equipment and link-layer protocols employing link\r\nlayer Automatic Repeat reQuest
    (ARQ) techniques. This document\r\npresumes that the designers wish to support
    Internet protocols, but\r\nmay be unfamiliar with the architecture of the Internet
    and with the\r\nimplications of their design choices on the performance and\r\nefficiency
    of Internet traffic carried over their links.</p>"
