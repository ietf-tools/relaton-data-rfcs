abstract:
- content: "<p>Traceability in supply chains is a growing security concern. While
    Verifiable Data Structures (VDSs) have addressed specific issues, such as equivocation
    over digital certificates, they lack a universal architecture for all supply chains.
    This document defines such an architecture for single-issuer signed statement
    transparency. It ensures extensibility and interoperability between different
    transparency services as well as compliance with various auditing procedures and
    regulatory requirements.</p>"
