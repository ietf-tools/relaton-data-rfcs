abstract:
- content: "<p>This Internet Draft defines a protocol for supporting the transport
    of \r\nany SS7 MTP3-User signalling (e.g., ISUP and SCCP messages) over IP \r\nusing
    the services of the Stream Control Transmission Protocol. Also, \r\nprovision
    is made for protocol elements that enable a seamless \r\noperation of the MTP3-User
    peers in the SS7 and IP domains. This \r\nprotocol would be used between a Signalling
    Gateway (SG) and a Media \r\nGateway Controller (MGC) or IP-resident Database.
    It is assumed that \r\nthe SG receives SS7 signalling over a standard SS7 interface
    using the \r\nSS7 Message Transfer Part (MTP) to provide transport.</p>"
