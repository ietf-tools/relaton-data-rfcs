abstract:
- content: "<p>This document describes high-level functional and interface\r\nrequirements
    for a client-server protocol for the registration and\r\nmanagement of Internet
    domain names in shared registries. Specific\r\ntechnical requirements detailed
    for protocol design are not presented\r\nhere. Instead, this document focuses
    on the basic functions and\r\ninterfaces required of a protocol to support multiple
    registry and\r\nregistrar operational models.</p>"
