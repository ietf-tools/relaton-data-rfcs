abstract:
- content: "<p>This document provides guidance to aid in the understanding of\r\ncollaboration
    on standards development between the International\r\nTelecommunication Union
    -- Telecommunication Standardization Sector\r\n(ITU-T) and the Internet Society
    (ISOC) / Internet Engineering Task\r\nForce (IETF). It is an update of and obsoletes
    [RFC 2436]. The\r\nupdates reflect changes in the IETF and ITU-T since RFC 2436
    was\r\nwritten. The bulk of this document is common text with ITU-T\r\nSupplement
    3 to the ITU-T A-Series Recommendations.\r\nThis was approved by TUT-T TSAG on
    30 November 2001 as a supplement\r\nto the ITU-T A-Series of recommendations (will
    be numbered as A-\r\nSeries Supplement 3)</p>"
