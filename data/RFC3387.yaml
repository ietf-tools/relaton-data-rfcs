abstract:
- content: "<p>The guiding principles in the design of IP network management were
    \r\nsimplicity and no centralized control. The best effort service \r\nparadigm
    was a result of the original management principles and the \r\nother way around.
    New methods to distinguish the service given to \r\none set of packets or flows
    relative to another are well underway. \r\nHowever, as IP networks evolve the
    management approach of the past \r\nmay not apply to the QoS-capable network envisioned
    by some for the \r\nfuture. We examine some of the areas of impact that QoS is
    likely \r\nto have on management and look at some questions that remain to be
    \r\naddressed.</p>"
