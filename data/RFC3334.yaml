abstract:
- content: "<p>This document describes policy-based accounting which is an approach\r\nto
    provide flexibility to accounting architectures. Accounting\r\npolicies describe
    the configuration of an accounting architecture in\r\na standardized way. They
    are used to instrument the accounting\r\narchitecture and can be exchanged between
    AAA entities in order to\r\nshare configuration information.\r\nThis document
    describes building blocks and message sequences for\r\npolicy-based accounting
    in the generic AAA architecture [RFC2903].\r\nExamples are given for the usage
    of accounting policies in different\r\nscenarios. Furthermore it is shown how
    accounting components can be\r\nintegrated into the AAA authorization framework
    [RFC2904]. This\r\ndocument does not propose a language for the description of\r\naccounting
    policies. It is rather assumed that a suitable policy\r\nlanguage can be chosen
    from existing or upcoming standards.</p>"
