abstract:
- content: "<p>The purpose of this document is to express the general Internet\r\n
    community's expectations of Computer Security Incident Response\r\n Teams (CSIRTs).
    It is not possible to define a set of requirements\r\n that would be appropriate
    for all teams, but it is possible and\r\n helpful to list and describe the general
    set of topics and issues\r\n which are of concern and interest to constituent
    communities.\r\n\r\n CSIRT constituents have a legitimate need and right to fully\r\n
    understand the policies and procedures of 'their' Computer Security\r\n Incident
    Response Team. One way to support this understanding is to\r\n supply detailed
    information which users may consider, in the form of\r\n a formal template completed
    by the CSIRT. An outline of such a\r\n template and a filled in example are provided.</p>"
