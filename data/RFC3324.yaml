abstract:
- content: "<p>There is no requirement for identities asserted by a UA in a SIP\r\nmessage
    to be anything other than the user's desired alias.\r\nA Network Asserted Identity
    is an identity initially derived by a SIP\r\nnetwork intermediary as a result
    of an authentication process. This\r\ndraft describes short term requirements
    for the exchange of Network\r\nAsserted Identities within networks of securely
    interconnected\r\ntrusted nodes and to User Agents securely connected to such
    networks.</p>"
