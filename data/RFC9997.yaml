abstract:
- content: <p>YANG-CBOR (RFC 9254, "Encoding of Data Modeled with YANG in the Concise
    Binary Object Representation (CBOR)") defines YANG Schema Item iDentifiers (YANG
    SIDs), globally unique 63-bit unsigned integers used to identify YANG items. RFC
    9595 ("YANG Schema Item iDentifier (YANG SID)") defines ways to allocate these
    SIDs using IANA registries.</p><p>The present specification employs these SID
    allocation mechanisms to allocate ranges of 100 000 SIDs (representation size
    64 bits) to each holder of an IANA Private Enterprise Number (PEN) of a value
    below 1 000 000. Holders of PENs of values smaller than 100 000 are also allocated
    ranges of 10 000 SIDs (representation size 32 bits).</p>
